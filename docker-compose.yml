services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    container_name: exchange-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exchange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exchange_secret}
      POSTGRES_DB: ${POSTGRES_DB:-exchange}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exchange} -d ${POSTGRES_DB:-exchange}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - In-memory cache, orderbook, rate limiting
  redis:
    image: redis:7-alpine
    container_name: exchange-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NATS JetStream — spot.match.* → writer → spot.orderbook.* (Tier-1 pipeline)
  nats:
    image: nats:2.10-alpine
    container_name: exchange-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    # JetStream + monitoring on 8222; verify with: curl -s http://localhost:8222/varz | head
    restart: unless-stopped

  # RabbitMQ - Message queue for event-driven architecture
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: exchange-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: exchange
      RABBITMQ_DEFAULT_PASS: exchange_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # EVM deposit indexer — updates indexer_state; pair with HEALTH_INDEXER_MAX_LAG_SEC + Prometheus indexer_state_lag_seconds
  indexer:
    build:
      context: ./apps/indexer
      dockerfile: Dockerfile
    container_name: exchange-indexer
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      # Always use Docker service hostname — host DATABASE_URL (127.0.0.1) breaks inside the container.
      - DATABASE_URL=postgresql://exchange:exchange_secret@postgres:5432/exchange
      - INDEXER_API_PORT=4001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: exchange-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://exchange:exchange_secret@postgres:5432/exchange
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://exchange:exchange_secret@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./apps/backend/logs:/app/logs
    restart: unless-stopped

  # Frontend — baked production bundle (NOT live src/). Port 3000 here is the USER app
  # (admin-panel is separate, dev :3001). If /markets etc. work in `next build` but not in
  # the browser, you are usually hitting this image: rebuild with
  #   docker compose build --no-cache frontend
  # For local canonical routes + hot reload, run instead from repo:
  #   cd apps/frontend && npm run dev
  #   # or: npm run dev:frontend  (from monorepo root)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: exchange-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:4000
      - NEXT_PUBLIC_WS_URL=ws://backend:4000/ws
      # Client-visible flag: console warning that this is a baked bundle (rebuild to pick up src changes)
      - NEXT_PUBLIC_DOCKER_USER_APP=1
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: exchange-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default:
    name: exchange-network
    driver: bridge
